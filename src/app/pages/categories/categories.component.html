<div class="container mt-4">
  <h1>Categories Management</h1>
  <p>Manage your categories efficiently.</p>
 <!-- Add Categories Button -->
  <button class="btn btn-success mb-3" (click)="openAddCategoriesDialog(addCategoriesDialog)">
    <i class="fas fa-plus"></i> Add Categories
  </button>

  <!-- Search -->
  <mat-form-field appearance="outline" class="w-100 mb-3">
    <mat-label>Search</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Search Categoriess">
  </mat-form-field>

  <!-- Table for large screens -->
  <div *ngIf="!isSmallScreen">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 w-100">

      <!-- Columns -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let Categories">{{ Categories.id }}</td>
      </ng-container>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let Categories">{{ Categories.name }}</td>
      </ng-container>
      <!-- <ng-container matColumnDef="sku">
        <th mat-header-cell *matHeaderCellDef>SKU</th>
        <td mat-cell *matCellDef="let Categories">{{ Categories.sku }}</td>
      </ng-container>
      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef>Category</th>
        <td mat-cell *matCellDef="let Categories">{{ Categories.category }}</td>
      </ng-container>
      <ng-container matColumnDef="stock">
        <th mat-header-cell *matHeaderCellDef>Stock</th>
        <td mat-cell *matCellDef="let Categories">{{ Categories.stock }}</td>
      </ng-container> -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let Categories">
          <button class="btn btn-primary btn-sm me-2" (click)="editCategories(Categories)">Edit</button>
          <button class="btn btn-danger btn-sm" (click)="deleteCategories(Categories)">Delete</button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10, 25, 50]" showFirstLastButtons></mat-paginator>
  </div>

  <!-- List for small screens -->
  <div *ngIf="isSmallScreen">
    <div *ngFor="let Categories of dataSource.filteredData" class="card mb-2">
      <div class="card-body">
        <h5 class="card-title">{{ Categories.name }} <span class="badge bg-secondary">{{ Categories.category }}</span></h5>
        <p class="card-text mb-1"><strong>ID:</strong> {{ Categories.id }}</p>
        <!-- <p class="card-text mb-1"><strong>SKU:</strong> {{ Categories.sku }}</p>
        <p class="card-text mb-1"><strong>Stock:</strong> {{ Categories.stock }}</p> -->
        <button class="btn btn-primary btn-sm me-2" (click)="editCategories(Categories)">Edit</button>
        <button class="btn btn-danger btn-sm" (click)="deleteCategories(Categories)">Delete</button>
      </div>
    </div>
  </div>

  <!-- Add/Edit Categories Dialog Template -->
  <ng-template #addCategoriesDialog let-dialogRef="dialogRef">
    <div class="card">
      <div class="card-body">
        <mat-card>
          <form #CategoriesForm="ngForm">
            <mat-card-header>
              <mat-card-title>{{ editingCategories ? 'Edit Categories' : 'Add Categories' }}</mat-card-title>
            </mat-card-header>
            <mat-card-content>
              <mat-form-field style="width: 100%;">
                <mat-label>Name</mat-label>
                <input matInput name="name" [(ngModel)]="CategoriesData.name" required>
              </mat-form-field>
              <!-- <mat-form-field style="width: 100%;">
                <mat-label>SKU</mat-label>
                <input matInput name="sku" [(ngModel)]="CategoriesData.sku" required>
              </mat-form-field> -->
              <!-- <mat-form-field style="width: 100%;">
                <mat-label>Category</mat-label>
                <input matInput name="category" [(ngModel)]="CategoriesData.category" required>
              </mat-form-field>
              <mat-form-field style="width: 100%;">
                <mat-label>Stock</mat-label>
                <input matInput type="number" name="stock" [(ngModel)]="CategoriesData.stock" required>
              </mat-form-field> -->
            </mat-card-content>
            <mat-card-actions>
              <button mat-raised-button color="primary" [disabled]="!CategoriesForm.valid"
                (click)="saveCategories(dialogRef)"> <mat-icon>save</mat-icon> Save</button>
              <button mat-button (click)="dialogRef.close()">Cancel</button>
            </mat-card-actions>
          </form>
        </mat-card>
      </div>
    </div>
  </ng-template>
  
  </div>
