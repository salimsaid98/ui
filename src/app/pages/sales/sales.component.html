<div class="container mt-4">
    <div class="container">
        <div class="card">
            <div class="card-body">
             <div class="row">
                <div class="col-md-4">
                       <!-- Payment Type -->
                <div class="mb-4">
                    <mat-form-field appearance="outline" class="w-full md:w-1/3">
                        <mat-label>Payment Type</mat-label>
                        <mat-select [(ngModel)]="paymentType" class="custom-select-box">
                            <mat-option value="Cash">Cash</mat-option>
                            <mat-option value="Credit">Credit</mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
                    <!-- Conditional Credit Form -->
                <div *ngIf="paymentType === 'Credit'" class="mb-4 border p-4 rounded bg-gray-100">
                    <label class="block mb-2 font-semibold">Customer</label>

                    <label class="inline-flex items-center mr-4">
                        <input type="radio" [(ngModel)]="useNewCustomer" [value]="false" />
                        <span class="ml-2">Select Existing</span>
                    </label>

                    <label class="inline-flex items-center">
                        <input type="radio" [(ngModel)]="useNewCustomer" [value]="true" />
                        <span class="ml-2">Add New</span>
                    </label>

                    <div *ngIf="!useNewCustomer" class="mt-2">
                        <mat-form-field appearance="outline" class="w-full md:w-1/2">
                            <mat-label>Select Customer</mat-label>
                            <input matInput [(ngModel)]="customerFilter" (ngModelChange)="filterCustomers()"
                                placeholder="Search..." />
                            <mat-select [(ngModel)]="selectedCustomerId" class="custom-select-box">
                                <mat-option *ngFor="let cust of filteredCustomers" [value]="cust.id">
                                    {{ cust.name }}
                                </mat-option>
                            </mat-select>
                        </mat-form-field>
                    </div>

                    <div *ngIf="useNewCustomer" class="mt-2">
                        <input [(ngModel)]="newCustomer.name" placeholder="Customer Name"
                            class="border px-3 py-2 rounded mb-2 block w-1/2" />
                        <input [(ngModel)]="newCustomer.phone" placeholder="Phone Number"
                            class="border px-3 py-2 rounded block w-1/2" />
                    </div>
                </div>

                </div>
                <div class="col-md-8">
                      <div class="p-4 max-w-4xl mx-auto">
                    <div class="flex space-x-4 mb-4 items-center">
                        <div class="flex items-center space-x-4">
                            <div class="flex items-center gap-4">
                                <!-- Select Product Field -->
                               <div class="container">
                                <div class="row">
                                    <div class="col">
                                         <mat-form-field class="w-full max-w-xs">
                                    <mat-label>Select Product</mat-label>
                                    <input matInput [(ngModel)]="productFilter" (ngModelChange)="filterProducts()"
                                        placeholder="Search product..." />
                                    <mat-select [(ngModel)]="selectedProductId">
                                        <mat-option value="0">None</mat-option>
                                        <mat-option *ngFor="let product of filteredProducts" [value]="product.id">
                                            {{ product.name }} - ${{ product.price }}
                                        </mat-option>
                                    </mat-select>
                                </mat-form-field>

                              
                                    </div>
                                    <div class="col">
                                          <!-- Quantity Field -->
                                <mat-form-field class="w-full max-w-xs">
                                    <mat-label>Qty</mat-label>
                                    <input matInput type="number" [(ngModel)]="quantity" min="1" placeholder="Qty" />
                                </mat-form-field>
                                    </div>
                                </div>
                               </div>
                            </div>

                        </div>
                        <button mat-raised-button color="primary" (click)="addToCart()"
                            class="bg-blue-500 text-white px-4 py-2 rounded">Add to Cart</button>
                    </div>

                    <!-- Cart Table -->
                    <table class="table table-striped table-bordered w-full mb-4">
                        <thead class="bg-gray-200">
                            <tr>
                                <th class="px-4 py-2">Product</th>
                                <th>Qty</th>
                                <th>Price</th>
                                <th>Total</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let item of cart">
                                <td class="px-4 py-2">{{ item.name }}</td>
                                <td>{{ item.quantity }}</td>
                                <td>${{ item.price }}</td>
                                <td>${{ item.quantity * item.price }}</td>
                                <td><button mat-raised-button color="warn" (click)="removeFromCart(item.id)"
                                        class="text-red-500">Remove</button></td>
                            </tr>
                        </tbody>
                        <tfoot>
                            <tr>
                                <td colspan="3" class="text-right font-semibold">Grand Total:</td>
                                <td colspan="2">${{ total }}</td>
                            </tr>
                        </tfoot>
                        
                    </table>
                                    <button mat-raised-button color="primary" (click)="submitSale()">Submit Sale</button>

                </div>
                </div>
             </div>

            
            </div>
        </div>
    </div>

</div>
