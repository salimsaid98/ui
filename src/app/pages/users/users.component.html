<h2>Users</h2>
<p>Manage your users here.</p>
<div class="container mt-4">
 <button class="btn btn-success mb-3" (click)="openAddUserDialog(addUserDialog)">
  <i class="fas fa-user-plus"></i> Add User
</button>
  <mat-form-field appearance="outline" class="w-100 mb-3">
    <mat-label>Search</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Search users">
  </mat-form-field>
 <!-- Only show table on large screens -->
<div *ngIf="!isSmallScreen">
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 w-100">
    <!-- ...columns as before... -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let user">{{ user.id }}</td>
    </ng-container>
    <ng-container matColumnDef="username">
      <th mat-header-cell *matHeaderCellDef>Username</th>
      <td mat-cell *matCellDef="let user">{{ user.username }}</td>
    </ng-container>
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let user">{{ user.email }}</td>
    </ng-container>
    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef>Role</th>
      <td mat-cell *matCellDef="let user">{{ user.role }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let user">
        <button class="btn btn-primary btn-sm">Edit</button>
        <button class="btn btn-danger btn-sm">Delete</button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
  <mat-paginator [pageSizeOptions]="[5, 10, 25, 50]" showFirstLastButtons></mat-paginator>
</div>

<!-- Show list on small screens -->
<div *ngIf="isSmallScreen">
  <div *ngFor="let user of dataSource.filteredData" class="card mb-2">
    <div class="card-body">
      <h5 class="card-title">{{ user.username }} <span class="badge bg-secondary">{{ user.role }}</span></h5>
      <p class="card-text mb-1"><strong>ID:</strong> {{ user.id }}</p>
      <p class="card-text mb-1"><strong>Email:</strong> {{ user.email }}</p>
      <button class="btn btn-primary btn-sm me-2">Edit</button>
      <button class="btn btn-danger btn-sm">Delete</button>
    </div>
  </div>
</div>
</div>
<ng-template #addUserDialog let-dialogRef="dialogRef">
  <div class="card">
    <div class="card-body">
      <mat-card>
        <form #userForm="ngForm">
          <mat-card-header>
            <mat-card-title>Add User</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <mat-form-field style="width: 100%;">
              <mat-label>Username</mat-label>
              <input matInput placeholder="Username" name="username" [(ngModel)]="User.username" required>
            </mat-form-field>
            <mat-form-field style="width: 100%;">
              <mat-label>Email</mat-label>
              <input matInput placeholder="Email" name="email" [(ngModel)]="User.email" required type="email">
            </mat-form-field>
            <mat-form-field style="width: 100%;">
              <mat-label>Role</mat-label>
              <mat-select name="role" [(ngModel)]="User.role" required>
                <mat-option value="Admin">Admin</mat-option>
                <mat-option value="User">User</mat-option>
                <mat-option value="Manager">Manager</mat-option>
              </mat-select>
            </mat-form-field>
          </mat-card-content>
          <mat-card-actions>
            <button mat-button color="primary" [disabled]="!userForm.valid"
              (click)="saveUser(dialogRef)"> <mat-icon>save</mat-icon> Save</button>
            <button  mat-button (click)="dialogRef.close()">Cancel</button>
          </mat-card-actions>
        </form>
      </mat-card>
    </div>
  </div>
</ng-template>
